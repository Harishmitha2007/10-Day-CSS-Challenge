<!DOCTYPE html>
<html>
<head>
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="text">
            <h2>Welcome</h2>
            <p>
                This is a responsive two-column layout.
                On desktop, text and image appear side by side.
                On smaller screens, they stack vertically.
            </p>
        </div>

        <div class="image">
            <img src="https://via.placeholder.com/400" alt="Sample Image">
        </div>
    </div>

</body>
</html>
